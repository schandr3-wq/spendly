{% extends "base.html" %}

{% block title %}Your profile — Spendly{% endblock %}

{% block content %}

<section class="profile-section">

    <div class="profile-header">
        <div class="profile-avatar">{{ user['name'][0]|upper }}</div>
        <div>
            <h1 class="profile-name">{{ user['name'] }}</h1>
            <p class="profile-meta">Member since {{ user['created_at'][:10] }}</p>
        </div>
    </div>

    <div class="profile-grid">

        <div class="auth-card">
            <h2 class="profile-card-title">
                <i data-lucide="user"></i>
                Account details
            </h2>
            <form method="post" action="{{ url_for('profile') }}">
                <div class="form-group">
                    <label for="name">Full name</label>
                    <input type="text" id="name" name="name"
                           class="form-input" value="{{ user['name'] }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email"
                           class="form-input" value="{{ user['email'] }}"
                           required>
                </div>
                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <div class="auth-card">
            <h2 class="profile-card-title">
                <i data-lucide="lock"></i>
                Change password
            </h2>
            <form method="post" action="{{ url_for('profile_password') }}">
                <div class="form-group">
                    <label for="current_password">Current password</label>
                    <input type="password" id="current_password" name="current_password"
                           class="form-input" placeholder="Your current password"
                           required>
                </div>
                <div class="form-group">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password"
                           class="form-input" placeholder="Min. 8 characters"
                           required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm new password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           class="form-input" placeholder="Re-enter new password"
                           required>
                </div>
                <button type="submit" class="btn-submit">Update password</button>
            </form>
        </div>

    </div>

</section>

{% endblock %}
